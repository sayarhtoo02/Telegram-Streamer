name: Android Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android App & Generate APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Create Env File Placeholder and Restore Debug Keystore
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi
          if [ ! -f debug.keystore ]; then
            echo "debug.keystore not found. Generating a new one using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug App (Sideload Ready APK)
        run: gradle assembleDebug

      - name: Check Release Signing Keys
        id: check_keys
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "keys_present=true" >> $GITHUB_OUTPUT
          else
            echo "keys_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Unsigned Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'false' }}
        run: gradle assembleRelease || echo "Unsigned release build skipped or failed. Falling back to debug."

      - name: Build Signed Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'true' }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
          fi
          gradle assembleRelease

      - name: Rename and Prepare Build Artifacts
        run: |
          mkdir -p artifacts/
          # Dynamically locate and rename generated APKs to guarantee copy succeeds regardless of fine-grained AGP structure
          find app/build/outputs/apk/ -name "*.apk" -print
          find app/build/outputs/apk/ -name "*debug.apk" -exec cp {} artifacts/TG-Streamer-debug.apk \; 2>/dev/null || true
          find app/build/outputs/apk/ -name "*release.apk" -exec cp {} artifacts/TG-Streamer-release.apk \; 2>/dev/null || true
          find app/build/outputs/apk/ -name "*release-unsigned.apk" -exec cp {} artifacts/TG-Streamer-release-unsigned.apk \; 2>/dev/null || true

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: artifacts/
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref_name == 'main' || github.ref_name == 'master' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: release-artifacts/

      - name: Generate Changelog
        id: changelog
        run: |
          echo "### 📱 TG Streamer Release" > release_notes.md
          echo "" >> release_notes.md
          echo "This release is automatically compiled by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 📦 Included Artifacts:" >> release_notes.md
          echo "- **TG-Streamer-debug.apk**: Fully functioning test build. Safe for general manual package side-loading." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 🔄 Recent Changes:" >> release_notes.md
          git log -n 5 --pretty=format:"* %s (%h)" >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Continuous Build' }}
          body_path: release_notes.md
          files: release-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
