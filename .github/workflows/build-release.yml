name: Android Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android App & Generate APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false # Fixes the Gradle Wrapper verification failure

      - name: Create Env File Placeholder
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi

      - name: Build Debug App (Sideload Ready APK)
        run: gradle assembleDebug

      - name: Check Release Signing Keys
        id: check_keys
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "keys_present=true" >> $GITHUB_OUTPUT
          else
            echo "keys_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Unsigned Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'false' }}
        run: gradle assembleRelease || echo "Unsigned release build skipped or failed. Falling back to debug."

      - name: Build Signed Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'true' }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
          fi
          gradle assembleRelease

      - name: Rename and Prepare Build Artifacts
        run: |
          mkdir -p artifacts/
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/TG-Streamer-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/TG-Streamer-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/TG-Streamer-release-unsigned.apk
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: artifacts/
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: release-artifacts/

      - name: Generate Changelog
        id: changelog
        run: |
          echo "### 📱 TG Streamer Release" > release_notes.md
          echo "" >> release_notes.md
          echo "This release is automatically compiled by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 📦 Included Artifacts:" >> release_notes.md
          echo "- **TG-Streamer-debug.apk**: Fully functioning test build. Safe for general manual package side-loading." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 🔄 Recent Changes:" >> release_notes.md
          git log -n 5 --pretty=format:"* %s (%h)" >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current' # Automatically uses a stable, compatible Gradle version

      - name: Create Env File Placeholder
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi

      - name: Build Debug App (Sideload Ready APK)
        run: gradle assembleDebug

      - name: Check Release Signing Keys
        id: check_keys
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "keys_present=true" >> $GITHUB_OUTPUT
          else
            echo "keys_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Unsigned Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'false' }}
        run: gradle assembleRelease || echo "Unsigned release build skipped or failed. Falling back to debug."

      - name: Build Signed Release App
        if: ${{ steps.check_keys.outputs.keys_present == 'true' }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
          fi
          gradle assembleRelease

      - name: Rename and Prepare Build Artifacts
        run: |
          mkdir -p artifacts/
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/TG-Streamer-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/TG-Streamer-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/TG-Streamer-release-unsigned.apk
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: artifacts/
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: release-artifacts/

      - name: Generate Changelog
        id: changelog
        run: |
          echo "### 📱 TG Streamer Release" > release_notes.md
          echo "" >> release_notes.md
          echo "This release is automatically compiled by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 📦 Included Artifacts:" >> release_notes.md
          echo "- **TG-Streamer-debug.apk**: Out-of-the-box side-loadable package." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 🔄 Recent Changes:" >> release_notes.md
          git log -n 5 --pretty=format:"* %s (%h)" >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
