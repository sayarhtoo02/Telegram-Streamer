name: Android Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0, v1.1.0)
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Enable manual triggers from the GitHub Actions tab

jobs:
  build:
    name: Build Android App & Generate APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Create Env File Placeholder
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi

      - name: Build Debug App (Sideload Ready APK)
        run: ./gradlew assembleDebug

      # Robust: only attempt to build release APK if we have keys, otherwise warn gracefully
      - name: Check Release Signing Keys
        id: check_keys
        run: |
          if [ -n "${{ secrets.STORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "keys_present=true" >> $GITHUB_OUTPUT
          else
            echo "keys_present=false" >> $GITHUB_OUTPUT
            echo "Release Key variables (STORE_PASSWORD / KEY_PASSWORD) are not set. Skipping Signed Release Build. Building Unsigned Release APK instead..."
          fi

      - name: Build Unsigned Release App
        if: steps.check_keys.outputs.keys_present == 'false'
        run: ./gradlew assembleRelease || echo "Release build failed because signing configuration requires keystore or credentials. Standard debug build will be used."

      - name: Build Signed Release App
        if: steps.check_keys.outputs.keys_present == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        run: |
          # Write keystore file from base64 secret to disk if provided
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
          fi
          ./gradlew assembleRelease

      - name: Rename and Prepare Build Artifacts
        run: |
          mkdir -p artifacts/
          
          # Copy Debug APK which is ready for easy device sideloading
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/TG-Streamer-v1.0-debug.apk
            echo "Prepared Debug APK."
          fi
          
          # Copy Release APK if compiled
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/TG-Streamer-v1.0-release.apk
            echo "Prepared Release APK."
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/TG-Streamer-v1.0-release-unsigned.apk
            echo "Prepared Unsigned Release APK."
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: artifacts/
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Clean check to run only when pushing a version tag

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          name: TG-Streamer-APKs
          path: release-artifacts/

      - name: Generate Changelog
        id: changelog
        run: |
          echo "### 📱 TG Streamer Release" > release_notes.md
          echo "" >> release_notes.md
          echo "This release is automatically compiled by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 📦 Included Artifacts:" >> release_notes.md
          echo "- **TG-Streamer-v1.0-debug.apk**: Fully functioning test build. Safe for general manual package side-loading." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### 🔄 Recent Changes:" >> release_notes.md
          git log -n 5 --pretty=format:"* %s (%h)" >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
